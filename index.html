<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謎解きご褒美</title>
    <style>
        /* 全体のスタイル */
        body {
            background-color: black;
            color: white;
            font-family: "ヒラギノ角ゴ ProN W1", "Hiragino Kaku Gothic ProN", "游ゴシック Light", "Yu Gothic Light", "Noto Sans JP", "Meiryo", sans-serif;
            font-weight: 200;
            margin: 0;
            padding: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 1; /* 背景より前面に配置 */
        }

        /* 背景の横線（2pxの線と8pxのスペースを交互に） */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: repeating-linear-gradient(0deg, #ffffff, #ffffff 2px, #000000 2px, #000000 10px);
            z-index: -2;
        }

        /* 台形の黒い部分（スマホ & PC共通） */
        .spotlight {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 100%; /* 下端が画面下にしっかりつくように変更 */
            background: black;
            clip-path: polygon(37.5% 0%, 62.5% 0%, 100% 100%, 0% 100%);
            z-index: -1; /* 文字より後ろに配置 */
        }

        /* PC版の台形を前の比率に戻す */
        @media (min-width: 768px) {
            .spotlight {
                clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
                height: 100%; /* 画面の高さを100%に設定 */
            }
        }

        /* ボタンと文字のスタイル復元 */
        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 500;
            color: #ddd;
            position: relative;
            display: inline-block;
            background: black;
            padding: 15px;
            overflow: hidden;
            text-shadow: 1px 1px 0 rgba(255, 0, 0, 0.3), -1px -1px 0 rgba(0, 0, 255, 0.3);
        }

        h2, h3 {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: white;
            margin-top: 10px;
        }

        button {
            width: 90%;
            max-width: 300px;
            height: 60px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            background: linear-gradient(45deg, transparent 5%, #000000 5%);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            box-shadow: 4px 0px 0px #0000ff;
            outline: none;
            position: relative;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            overflow: hidden;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="background"></div>  <!-- 背景の横線 -->
    <div class="spotlight"></div>  <!-- 中央の台形 -->

    <h1 class="flash">おめでとうございます。<br>貴方は隠された謎を見事解き明かしました。</h1>
    <h3>答えやこのページのリンクを拡散することはご遠慮ください。</h3>
    <h2>ここをタップするとXにポストができます。</h2>

    <button id="tweetButton">ポストする</button>

    <script>
        document.getElementById('tweetButton').onclick = function() {
            const tweetText = encodeURIComponent("MV【ファイル・アタッチメント】に隠された謎を見事発見し解き明かしました！");
            const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
            window.open(twitterUrl, '_blank');
        };

        console.log("%c ここには何もありませんよ、知りたがりさん", "color: red; font-size: 16px; font-weight: bold;");
    </script>
</body>
</html>
