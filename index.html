<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謎解きご褒美</title>
    <style>
        /* 全体のスタイル */
        body {
            background-color: black;
            color: white;
            font-family: "ヒラギノ角ゴ ProN W1", "Hiragino Kaku Gothic ProN", "游ゴシック Light", "Yu Gothic Light", "Noto Sans JP", "Meiryo", sans-serif;
            font-weight: 200;
            margin: 0;
            padding: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 背景の横線 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background:
                repeating-linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0.5) 0px,
                    rgba(255, 255, 255, 0.5) 2px,
                    transparent 12px
                );
            z-index: -1;
        }

        /* 三角形の黒い部分（スマホ用） */
        .spotlight {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 70%;
            background: black;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            z-index: 0;
        }

        /* PC版の調整（台形に変更） */
        @media (min-width: 768px) {
            .spotlight {
                clip-path: polygon(45% 0%, 55% 0%, 100% 100%, 0% 100%);
                height: 100%;
            }
            .glow {
                width: 600px;
                height: 120px;
            }
        }

        /* ボタン下の横縞の楕円 */
        .glow {
            position: absolute;
            bottom: 50px;
            width: 300px;
            height: 60px;
            background:
                repeating-linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0.5) 0px,
                    rgba(255, 255, 255, 0.5) 2px,
                    transparent 12px
                );
            border-radius: 50%;
            filter: blur(0.5px);
            z-index: 1;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: white;
            margin-top: 5vh;
            font-weight: 200;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: white;
            user-select: none;
            font-weight: 200;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        h3 {
            font-size: clamp(0.7rem, 2.4vw, 1.1rem);
            color: gray;
            font-weight: 200;
            margin-top: -10px;
            position: relative;
            z-index: 1;
        }

        /* ボタン */
        button {
            width: 90%;
            max-width: 300px;
            height: 60px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            background: linear-gradient(45deg, transparent 5%, #000000 5%);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            box-shadow: 4px 0px 0px #0000ff;
            outline: none;
            position: relative;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            overflow: hidden;
            cursor: pointer;
            animation: glitch 2s infinite steps(2, end);
            z-index: 1;
        }

        /* ボタンのグリッチテキストを少し右下にずらす */
        button::after {
            content: "ポストする";
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            top: 3px;
            left: 3px;
            background: linear-gradient(45deg, transparent 3%, #ff0000 3%, #00ff00 5%, #000000 5%);
            text-shadow: -1px -1px 0px #00ff00, 1px 1px 0px #ff0000;
            clip-path: inset(0% 0% 0% 0%);
            animation: glitch 2s infinite steps(2, end);
        }

        /* グリッチの揺れを控えめに */
        @keyframes glitch {
            0% {
                clip-path: var(--slice-1);
                transform: translate(-2px, -2px);
            }
            20% {
                clip-path: var(--slice-3);
                transform: translate(2px, 2px);
            }
            40% {
                clip-path: var(--slice-1);
                transform: translate(-1px, 1px);
            }
            60% {
                clip-path: var(--slice-2);
                transform: translate(1px, -1px);
            }
            80% {
                clip-path: var(--slice-5);
                transform: translate(-1px, 1px);
            }
            100% {
                clip-path: var(--slice-1);
                transform: translate(0);
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>  <!-- 背景の横線 -->
    <div class="spotlight"></div>  <!-- 中央の黒い部分（レスポンシブ対応） -->
    
    <h1 class="flash">おめでとうございます。<br>貴方は隠された謎を見事解き明かしました。</h1>
    <h3>答えやこのページのリンクを拡散することはご遠慮ください。</h3>
    <h2>ここをタップするとXにポストができます。</h2>

    <button id="tweetButton">ポストする</button>
    <div class="glow"></div>  <!-- ボタン下の光の横縞楕円 -->

    <script>
        document.getElementById('tweetButton').onclick = function() {
            const tweetText = encodeURIComponent("MV【ファイル・アタッチメント】に隠された謎を見事発見し解き明かしました！");
            const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
            window.open(twitterUrl, '_blank');
        };
    </script>
</body>
</html>
