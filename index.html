<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謎解きご褒美</title>
    <style>
        /* 全体のスタイル */
        body {
            background-color: black;
            color: white;
            font-family: "ヒラギノ角ゴ ProN W1", "Hiragino Kaku Gothic ProN", "游ゴシック Light", "Yu Gothic Light", "Noto Sans JP", "Meiryo", sans-serif;
            font-weight: 200;
            margin: 0;
            padding: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 1; /* 背景より前面に配置 */
        }

        /* 背景の横線（2pxの線と8pxのスペースを交互に） */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: repeating-linear-gradient(0deg, #ffffff, #ffffff 1px, #000000 2px, #000000 10px);
            z-index: -2;
        }

        /* 台形の黒い部分（スマホ & PC共通） */
        .spotlight {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 70%;
            background: black;
            clip-path: polygon(37.5% 0%, 62.5% 0%, 100% 100%, 0% 100%);
            z-index: -1; /* 文字より後ろに配置 */
        }

        /* PC版の台形を前の比率に戻す */
        @media (min-width: 768px) {
            .spotlight {
                clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>  <!-- 背景の横線 -->
    <div class="spotlight"></div>  <!-- 中央の台形 -->

    <h1 class="flash">おめでとうございます。<br>貴方は隠された謎を見事解き明かしました。</h1>
    <h3>答えやこのページのリンクを拡散することはご遠慮ください。</h3>
    <h2>ここをタップするとXにポストができます。</h2>

    <button id="tweetButton">ポストする</button>

    <script>
        document.getElementById('tweetButton').onclick = function() {
            const tweetText = encodeURIComponent("MV【ファイル・アタッチメント】に隠された謎を見事発見し解き明かしました！");
            const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
            window.open(twitterUrl, '_blank');
        };

        console.log("%c ここには何もありませんよ、知りたがりさん", "color: red; font-size: 16px; font-weight: bold;");
    </script>
</body>
</html>
