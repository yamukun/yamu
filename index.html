<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>謎解きご褒美</title><style>body{background-color:#000;color:#fff;font-family:"ヒラギノ角ゴ ProN W1","Hiragino Kaku Gothic ProN","游ゴシック Light","Yu Gothic Light","Noto Sans JP",Meiryo,sans-serif;font-weight:200;margin:0;padding:0;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;position:relative;overflow:hidden}.background{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.5) 0,rgba(255,255,255,.3) 3px,transparent 9px);mask-image:linear-gradient(to bottom,#000 0,#000 40%,transparent 70%);-webkit-mask-image:linear-gradient(to bottom,#000 0,#000 40%,transparent 70%);z-index:-1}.spotlight{position:fixed;top:0;left:50%;transform:translateX(-50%);width:120%;height:70%;background:#000;clip-path:polygon(37.5% 0,62.5% 0,100% 100%,0 100%);z-index:0}@media (min-width:768px){.spotlight{clip-path:polygon(45% 0,55% 0,100% 100%,0 100%);height:100%}.glow{width:600px;height:120px}}.glow{position:absolute;bottom:50px;width:300px;height:60px;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.5) 0,rgba(255,255,255,.3) 3px,transparent 9px);border-radius:50%;mask-image:linear-gradient(to right,transparent,#000 40%,#000 60%,transparent);-webkit-mask-image:linear-gradient(to right,transparent,#000 40%,#000 60%,transparent);filter:blur(1px);z-index:1}h1{font-size:clamp(1.8rem,5vw,2.5rem);color:#fff;margin-top:5vh;font-weight:200;position:relative;z-index:1}h2{font-size:clamp(1rem,3vw,1.5rem);color:#fff;user-select:none;font-weight:200;margin-top:10px;position:relative;z-index:1}h3{font-size:clamp(.7rem,2.4vw,1.1rem);color:gray;font-weight:200;margin-top:-10px;position:relative;z-index:1}button{width:90%;max-width:300px;height:60px;font-size:clamp(1rem,4vw,1.5rem);background:linear-gradient(45deg,transparent 5%,#000 5%);color:#fff;border:2px solid #fff;border-radius:5px;box-shadow:4px 0 0 #00f;outline:0;position:relative;margin:15px auto;display:flex;align-items:center;justify-content:center;padding:10px 0;overflow:hidden;cursor:pointer;animation:glitch 2s infinite steps(2,end);z-index:1}button::after{content:"ポストする";position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;top:3px;left:3px;background:linear-gradient(45deg,transparent 3%,red 3%,#0f0 5%,#000 5%);text-shadow:-1px -1px 0 #0f0,1px 1px 0 red;clip-path:inset(0 0 0 0);animation:glitch 2s infinite steps(2,end)}@keyframes glitch{0%{clip-path:var(--slice-1);transform:translate(-2px,-2px)}20%{clip-path:var(--slice-3);transform:translate(2px,2px)}40%{clip-path:var(--slice-1);transform:translate(-1px,1px)}60%{clip-path:var(--slice-2);transform:translate(1px,-1px)}80%{clip-path:var(--slice-5);transform:translate(-1px,1px)}100%{clip-path:var(--slice-1);transform:translate(0)}}</style></head><body><div class="background"></div><div class="spotlight"></div><h1 class="flash">おめでとうございます。<br>貴方は隠された謎を見事解き明かしました。</h1><h3>答えやこのページのリンクを拡散することはご遠慮ください。</h3><h2>ここをタップするとXにポストができます。</h2><button id="tweetButton">ポストする</button><div class="glow"></div><script>document.getElementById('tweetButton').onclick = function() {
            const tweetText = encodeURIComponent("MV【ファイル・アタッチメント】に隠された謎を見事発見し解き明かしました！");
            const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
            window.open(twitterUrl, '_blank');
        };
        console.log("%c ここには何もありませんよ、知りたがりさん", "color: red; font-size: 16px; font-weight: bold;");</script></body></html>
